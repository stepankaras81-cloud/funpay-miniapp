<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FunPay - Отзывы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: radial-gradient(ellipse at 50% 0%, #1a1a2e 0%, #0f0f12 100%);
            color: #ffffff;
            min-height: 100vh;
            padding: 16px 16px 30px;
            overflow-x: hidden;
        }
        .bg-glow {
            position: fixed;
            top: -30%;
            left: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(108, 92, 231, 0.15) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .bg-glow-2 {
            position: fixed;
            bottom: -30%;
            right: -20%;
            width: 80%;
            height: 80%;
            background: radial-gradient(circle, rgba(162, 155, 254, 0.10) 0%, transparent 70%);
            pointer-events: none;
            z-index: 0;
        }
        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            background: rgba(26, 26, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 12px 16px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.4);
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .avatar {
            width: 48px;
            height: 48px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.3);
            transition: transform 0.3s ease;
        }
        .avatar:hover { transform: scale(1.05); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .header-center { text-align: center; flex: 1; padding: 0 12px; }
        .header-center .name {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 60%, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }
        .header-center .sub {
            font-size: 13px;
            color: rgba(255,255,255,0.5);
            margin-top: 2px;
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        .header-center .sub span { color: #a29bfe; }
        .lang-buttons {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .lang-btn {
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.08);
            border-radius: 10px;
            padding: 4px 12px;
            color: rgba(255,255,255,0.4);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-color: #6c5ce7;
            color: #fff;
            box-shadow: 0 0 20px rgba(108, 92, 231, 0.3);
        }
        .lang-btn:active { transform: scale(0.95); }

        .rating-card {
            background: rgba(26, 26, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 24px 20px;
            margin-bottom: 16px;
            text-align: center;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            transition: transform 0.2s ease;
        }
        .rating-card:hover { transform: translateY(-2px); }
        .rating-card .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            color: rgba(255,255,255,0.3);
            font-weight: 600;
            margin-bottom: 12px;
        }
        .rating-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 16px;
            flex-wrap: wrap;
        }
        .rating-number {
            font-size: 56px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #fff, #a29bfe);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .rating-stars {
            font-size: 28px;
            line-height: 1;
            color: #fbbf24;
            letter-spacing: 4px;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.2);
        }
        .rating-count {
            font-size: 15px;
            color: rgba(255,255,255,0.4);
            margin-top: 8px;
            font-weight: 500;
        }
        .rating-count span {
            color: #a29bfe;
            font-weight: 700;
        }

        .rating-distribution {
            background: rgba(26, 26, 30, 0.7);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 20px;
            padding: 16px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.2);
        }
        .rating-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 0;
            border-bottom: 1px solid rgba(255,255,255,0.04);
        }
        .rating-row:last-child { border-bottom: none; }
        .rating-label {
            font-size: 14px;
            color: rgba(255,255,255,0.6);
            min-width: 48px;
            font-weight: 500;
        }
        .rating-bar-bg {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.06);
            border-radius: 4px;
            overflow: hidden;
        }
        .rating-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe);
            transition: width 1s ease;
            width: 0%;
        }
        .rating-count-number {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            min-width: 50px;
            text-align: right;
            font-weight: 500;
        }
        .rating-percent {
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            min-width: 38px;
            text-align: right;
            font-weight: 400;
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        .section-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 16px;
        }
        .section-sub a {
            color: #a29bfe;
            text-decoration: none;
            font-weight: 500;
            padding: 3px 10px;
            background: rgba(108, 92, 231, 0.1);
            border-radius: 10px;
            border: 1.5px solid rgba(108, 92, 231, 0.2);
            transition: all 0.3s ease;
            display: inline-block;
        }
        .section-sub a:hover {
            background: rgba(108, 92, 231, 0.2);
            border-color: #6c5ce7;
            box-shadow: 0 0 25px rgba(108, 92, 231, 0.2);
            transform: scale(1.03);
        }

        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.4);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            margin-bottom: 6px;
        }
        .stars-input {
            display: flex;
            gap: 10px;
            font-size: 38px;
            user-select: none;
            padding: 4px 0;
            flex-wrap: wrap;
            align-items: center;
        }
        .stars-input .star {
            color: rgba(255,255,255,0.08);
            cursor: pointer;
            font-size: 38px;
            line-height: 1;
            transition: all 0.2s ease;
            transform-origin: center;
        }
        .stars-input .star.active {
            color: #fbbf24;
            text-shadow: 0 0 30px rgba(251, 191, 36, 0.3);
        }
        .stars-input .star:hover {
            transform: scale(1.2);
        }
        .rating-selected {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-left: 12px;
            font-weight: 500;
            padding: 4px 14px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .rating-selected.active-text {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.08);
            border-color: rgba(251, 191, 36, 0.15);
        }

        .form-control {
            width: 100%;
            padding: 14px 16px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 14px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .form-control:focus {
            border-color: #6c5ce7;
            box-shadow: 0 0 0 4px rgba(108, 92, 231, 0.15);
            background: rgba(255,255,255,0.06);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.2); }
        textarea.form-control {
            resize: vertical;
            min-height: 80px;
            font-family: 'Inter', sans-serif;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            border-radius: 16px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 20px rgba(108, 92, 231, 0.3);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
        }
        .btn-submit:active {
            transform: scale(0.97);
            box-shadow: 0 2px 10px rgba(108, 92, 231, 0.2);
        }
        .btn-submit:hover {
            box-shadow: 0 8px 30px rgba(108, 92, 231, 0.4);
            transform: translateY(-1px);
        }

        .reviews-section { margin-top: 20px; }
        .review-item {
            background: rgba(26, 26, 30, 0.6);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 18px;
            padding: 16px 18px;
            margin-bottom: 12px;
            transition: all 0.3s ease;
            box-shadow: 0 4px 16px rgba(0,0,0,0.1);
        }
        .review-item:hover {
            border-color: rgba(108, 92, 231, 0.2);
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
            transform: translateY(-2px);
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .review-nick {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.2px;
        }
        .review-stars {
            color: #fbbf24;
            font-size: 14px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.1);
        }
        .review-gift {
            font-size: 13px;
            color: #a29bfe;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .review-text {
            font-size: 14px;
            color: rgba(255,255,255,0.7);
            line-height: 1.5;
            margin-bottom: 8px;
        }
        .review-date {
            font-size: 12px;
            color: rgba(255,255,255,0.2);
            text-align: right;
            font-weight: 400;
        }
        .review-item.user-review {
            border-color: #6c5ce7;
            background: rgba(108, 92, 231, 0.08);
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.05);
        }
        .review-item.user-review .review-nick {
            color: #a29bfe;
        }
        .review-item.user-review .review-gift {
            color: #fbbf24;
        }
        .review-item.user-review .review-text {
            color: #fff;
        }

        .load-more-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            color: rgba(255,255,255,0.4);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            font-family: 'Inter', sans-serif;
        }
        .load-more-btn:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(108, 92, 231, 0.3);
            color: #fff;
        }
        .load-more-btn:active { transform: scale(0.97); }
        .load-more-btn.hidden { display: none; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: rgba(26, 26, 30, 0.9);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 14px 28px;
            border-radius: 16px;
            font-size: 14px;
            color: #fff;
            opacity: 0;
            transition: opacity 0.4s ease, transform 0.3s ease;
            pointer-events: none;
            box-shadow: 0 8px 40px rgba(0,0,0,0.6);
            white-space: nowrap;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="bg-glow"></div>

    <div class="container">

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setBackgroundColor('#0f0f12');
        tg.setHeaderColor('#0f0f12');

        const BASE_TOTAL = 44759;
        const STORAGE_KEY = 'funpay_user_review';
        const STORAGE_TOTAL_KEY = 'funpay_total_reviews';
        const STORAGE_ALL_REVIEWS_KEY = 'funpay_all_reviews_fixed';
        const RATING_SELECTED = document.getElementById('ratingSelected');

        function loadUserReview() {
            try { const saved = localStorage.getItem(STORAGE_KEY); if (saved) return JSON.parse(saved); } catch (e) {}
            return null;
        }
        function loadTotalReviews() {
            try { const saved = localStorage.getItem(STORAGE_TOTAL_KEY); if (saved) return parseInt(saved); } catch (e) {}
            return BASE_TOTAL;
        }
        function loadAllReviews() {
            try {
                const saved = localStorage.getItem(STORAGE_ALL_REVIEWS_KEY);
                if (saved) { const data = JSON.parse(saved); if (data && data.length > 0) return data; }
            } catch (e) {}
            return null;
        }
        function saveUserReview(review) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(review)); } catch (e) {} }
        function saveTotalReviews(total) { try { localStorage.setItem(STORAGE_TOTAL_KEY, String(total)); } catch (e) {} }
        function saveAllReviews(reviews) { try { localStorage.setItem(STORAGE_ALL_REVIEWS_KEY, JSON.stringify(reviews)); } catch (e) {} }

        function updateRatingDisplay(value) {
            if (value === 0) {
                RATING_SELECTED.textContent = '0 ✩';
                RATING_SELECTED.classList.remove('active-text');
            } else {
                const stars = '⭐'.repeat(value) + '✩'.repeat(5 - value);
                RATING_SELECTED.textContent = `${value} из 5 — ${stars}`;

        ];

        function getRandomDate() {
            const day = Math.floor(Math.random() * 12) + 1;
            return `${day} июля 2026 г.`;
        }

        function generateUniqueReviews() {
            const reviews = [];
            const usedCombos = new Set();
            let longIndex = 0;
            let shortIndex = 0;
            const shuffledNicks = [...UNIQUE_NICKS].sort(() => 0.5 - Math.random());
            for (let i = 0; i < shuffledNicks.length; i++) {
                const nick = shuffledNicks[i];
                const giftIndex = i % GIFTS.length;
                const gift = GIFTS[giftIndex];
                let text;
                if (i % 7 === 0 || i % 9 === 0 || i % 5 === 0) {
                    text = LONG_TEXTS[longIndex % LONG_TEXTS.length];
                    longIndex++;
                } else {
                    text = SHORT_TEXTS[shortIndex % SHORT_TEXTS.length];
                    shortIndex++;
                }
                const key = `${nick}|${gift}|${text}`;
                if (!usedCombos.has(key)) {
                    usedCombos.add(key);
                    const date = getRandomDate();
                    const rating = Math.random() > 0.1 ? 5 : 4;
                    reviews.push({ nick, gift, text, date, rating });
                }
            }
            let counter = 0;
            let longIndex2 = 0;
            let shortIndex2 = 0;
            while (reviews.length < 1000) {
                const nick = UNIQUE_NICKS[counter % UNIQUE_NICKS.length];
                const gift = GIFTS[counter % GIFTS.length];
                let text;
                if (counter % 7 === 0 || counter % 9 === 0 || counter % 5 === 0) {
                    text = LONG_TEXTS[longIndex2 % LONG_TEXTS.length];
                    longIndex2++;
                } else {
                    text = SHORT_TEXTS[shortIndex2 % SHORT_TEXTS.length];
                    shortIndex2++;
                }
                const key = `${nick}|${gift}|${text}`;
                if (!usedCombos.has(key)) {
                    usedCombos.add(key);
                    const date = getRandomDate();
                    const rating = Math.random() > 0.1 ? 5 : 4;
                    reviews.push({ nick, gift, text, date, rating });
                }
                counter++;
            }
            return reviews;
        }

        const PER_PAGE = 50;
        let currentPage = 0;
        let allReviews = [];
        let userReview = null;
        let currentTotal = BASE_TOTAL;
        const container = document.getElementById('reviewsContainer');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const totalDisplay = document.getElementById('totalReviewsDisplay');

        userReview = loadUserReview();
        currentTotal = loadTotalReviews();

        const savedReviews = loadAllReviews();
        if (savedReviews) {
            allReviews = savedReviews;
        } else {
            allReviews = generateUniqueReviews();
            saveAllReviews(allReviews);
        }

        function renderPage(page, showUserReview = false) {
            const start = page * PER_PAGE;
            const end = Math.min(start + PER_PAGE, allReviews.length);
            let pageReviews = allReviews.slice(start, end);
            let reviewsToShow = [...pageReviews];
            if (showUserReview && userReview && page === 0) {
                reviewsToShow = [userReview, ...reviewsToShow];
            }
            const html = reviewsToShow.map(r => {
                const isUser = r === userReview;
                return `
                    <div class="review-item ${isUser ? 'user-review' : ''}">
                        <div class="review-header">
                            <span class="review-nick">${r.nick}</span>
                            <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                        </div>
                        <div class="review-gift">${r.gift}</div>
                        <div class="review-text">${r.text}</div>
                        <div class="review-date">${r.date}</div>
                    </div>
                `;
            }).join('');
            if (page === 0) {
                container.innerHTML = html;
            } else {
                container.innerHTML += html;
            }
            totalDisplay.textContent = currentTotal;
            const remaining = allReviews.length - end;
            if (end >= allReviews.length && !userReview) {
                loadMoreBtn.classList.add('hidden');
            } else if (end >= allReviews.length && userReview) {
                if (page === 0) {
                    loadMoreBtn.classList.add('hidden');
                } else {
                    loadMoreBtn.classList.add('hidden');
                }
            } else {
                loadMoreBtn.classList.remove('hidden');
                const remainingCount = allReviews.length - end;
                loadMoreBtn.textContent = `Загрузить еще (${Math.min(remainingCount, PER_PAGE)})`;
            }
        }

        loadMoreBtn.addEventListener('click', () => {
            currentPage++;
            renderPage(currentPage, userReview !== null);
        });

        const nickInput = document.getElementById('nickInput');
        const giftInput = document.getElementById('giftInput');
        const textInput = document.getElementById('textInput');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            if (user.username) nickInput.value = '@' + user.username;
            else if (user.first_name) nickInput.value = user.first_name;
        }

        submitBtn.addEventListener('click', function() {
            const t = translations[currentLang];
            const rating = selectedRating;
            const nick = nickInput.value.trim() || 'Аноним';
            const gift = giftInput.value.trim() || 'Подарок';
            const text = textInput.value.trim();
            if (rating === 0) { showToast(t.toastError); return; }
            if (!text) { showToast(t.toastErrorText); return; }
            const now = new Date();
            const day = now.getDate();
            const month = ['января', 'февраля', 'марта', 'апреля', 'мая', 'июня', 'июля', 'августа', 'сентября', 'октября', 'ноября', 'декабря'][now.getMonth()];
            const year = now.getFullYear();
            const dateStr = `${day} ${month} ${year} г.`;
            userReview = {
                nick, gift, text,
                date: dateStr,
                rating,
                isUser: true
            };
            currentTotal = currentTotal + 1;
            saveUserReview(userReview);
            saveTotalReviews(currentTotal);
            currentPage = 0;
            container.innerHTML = '';
            renderPage(0, true);
            showToast(t.toast);
            selectedRating = 0;
            starElements.forEach(s => s.classList.remove('active'));
            updateRatingDisplay(0);
            giftInput.value = '';
            textInput.value = '';
        });

        const translations = {
            ru: {
                brandName: 'FunPay Market',
                brandSub: 'отзывы о сделках маркета',
                ratingLabel: 'Отзывы о сделках маркета',

                labelNick: 'NICKNAME',
                labelGift: 'GIFT',
                labelText: 'TEXT',
                placeholderNick: 'Your nickname',
                placeholderGift: 'Gift name',
                placeholderText: 'Describe the deal',
                toast: '✅ Your review has been added!',
                toastError: '⚠️ Please select a rating (1-5)',
                toastErrorNick: '⚠️ Enter your nickname',
                toastErrorGift: '⚠️ Enter the gift name',
                toastErrorText: '⚠️ Write your review text',
                btnSubmit: 'Send review',
                loadMore: 'Load more'
            }

        let currentLang = 'ru';

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('brandName').textContent = t.brandName;
            document.getElementById('brandSub').textContent = t.brandSub;
            document.getElementById('ratingLabel').textContent = t.ratingLabel;
            document.getElementById('reviewsText').textContent = t.reviewsText;
            document.getElementById('formTitle').textContent = t.formTitle;
            document.getElementById('formSub').innerHTML = t.formSub;
            document.getElementById('labelRating').textContent = t.labelRating;
            document.getElementById('labelNick').textContent = t.labelNick;
            document.getElementById('labelGift').textContent = t.labelGift;
            document.getElementById('labelText').textContent = t.labelText;
            document.getElementById('nickInput').placeholder = t.placeholderNick;
            document.getElementById('giftInput').placeholder = t.placeholderGift;
            document.getElementById('textInput').placeholder = t.placeholderText;
            document.getElementById('submitBtn').textContent = t.btnSubmit;
            document.getElementById('langRu').classList.toggle('active', lang === 'ru');
            document.getElementById('langEn').classList.toggle('active', lang === 'en');
            updateRatingDisplay(selectedRating);
        }

        document.getElementById('langRu').addEventListener('click', () => setLanguage('ru'));
        document.getElementById('langEn').addEventListener('click', () => setLanguage('en'));

        const starsContainer = document.getElementById('starsContainer');
        const starElements = starsContainer.querySelectorAll('.star');
        let selectedRating = 0;

        starElements.forEach(star => {
            star.addEventListener('click', function() {
                const value = parseInt(this.dataset.value);
                selectedRating = value;
                starElements.forEach(s => {
                    const val = parseInt(s.dataset.value);
                    if (val <= value) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
                updateRatingDisplay(value);
            });
            star.addEventListener('mouseenter', function() {
                const value = parseInt(this.dataset.value);
                starElements.forEach(s => {
                    const val = parseInt(s.dataset.value);
                    s.style.color = val <= value ? '#fbbf24' : 'rgba(255,255,255,0.08)';
                });
            });
            star.addEventListener('mouseleave', function() {
                starElements.forEach(s => {
                    if (s.classList.contains('active')) {
                        s.style.color = '#fbbf24';
                    } else {
                        s.style.color = 'rgba(255,255,255,0.08)';
                    }
                });
            });
        });

        let toastTimeout;
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 3000);
        }

        tg.onEvent('viewportChanged', function() {
            tg.expand();
        });

        totalDisplay.textContent = currentTotal;
        renderPage(0, userReview !== null);
        updateRatingDisplay(0);
        console.log('FunPay WebApp loaded! Total: ' + currentTotal);
    </script>
