<html lang="ru">

    <title>FunPay - Отзывы</title>

    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f12;
            color: #ffffff;
            min-height: 100vh;
            padding: 16px 16px 30px;
        }
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #1a1a1e;
            border-radius: 16px;
            border: 1px solid #2a2a30;
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 4px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .header-center { text-align: center; flex: 1; }
        .header-center .name { font-size: 18px; font-weight: 700; color: #fff; line-height: 1.2; }
        .header-center .sub { font-size: 13px; color: #888; margin-top: 2px; }
        .header-center .sub span { color: #6c5ce7; }
        .lang-buttons { display: flex; gap: 6px; flex-shrink: 0; }
        .lang-btn {
            background: transparent;
            border: 1px solid #2a2a30;
            border-radius: 8px;
            padding: 4px 12px;
            color: #666;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-btn.active { background: #6c5ce7; border-color: #6c5ce7; color: #fff; }
        .lang-btn:active { transform: scale(0.95); }

        .rating-card {
            background: linear-gradient(135deg, #1a1a1e, #22222a);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 16px;
            border: 1px solid #2a2a30;
            text-align: center;
        }
        .rating-card .label { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .rating-main { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .rating-number { font-size: 48px; font-weight: 800; color: #fff; line-height: 1; }
        .rating-stars { font-size: 28px; line-height: 1; color: #fbbf24; letter-spacing: 2px; }
        .rating-count { font-size: 15px; color: #888; margin-top: 6px; }
        .rating-count span { color: #6c5ce7; font-weight: 600; }

        .rating-distribution {
            background: #1a1a1e;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2a30;
        }
        .rating-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 0;
            border-bottom: 1px solid #25252b;
        }
        .rating-row:last-child { border-bottom: none; }
        .rating-label { font-size: 14px; color: #aaa; min-width: 45px; font-weight: 500; }
        .rating-bar-bg { flex: 1; height: 6px; background: #25252b; border-radius: 4px; overflow: hidden; }
        .rating-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #6c5ce7, #a29bfe); transition: width 0.6s ease; }
        .rating-count-number { font-size: 13px; color: #888; min-width: 50px; text-align: right; font-weight: 500; }
        .rating-percent { font-size: 12px; color: #555; min-width: 38px; text-align: right; font-weight: 400; }

        .reviews-section { margin-top: 20px; }
        .review-item {
            background: #1a1a1e;
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 12px;
            border: 1px solid #2a2a30;
            transition: border-color 0.2s;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .review-nick { font-size: 16px; font-weight: 600; color: #fff; }
        .review-stars { color: #fbbf24; font-size: 14px; letter-spacing: 2px; }
        .review-gift { font-size: 13px; color: #6c5ce7; font-weight: 500; margin-bottom: 6px; }
        .review-text { font-size: 14px; color: #aaa; line-height: 1.5; margin-bottom: 8px; }
        .review-date { font-size: 12px; color: #555; text-align: right; }

        .section-title { font-size: 14px; font-weight: 600; color: #aaa; margin-bottom: 4px; }
        .section-sub { font-size: 13px; color: #666; margin-bottom: 16px; }
        .section-sub a { color: #6c5ce7; text-decoration: none; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #ccc; margin-bottom: 6px; }

        .stars-input {
            display: flex;
            gap: 10px;
            font-size: 40px;
            user-select: none;
            padding: 8px 0;
        }
        .stars-input .star {
            color: #333;
            cursor: pointer;
            font-size: 40px;
            line-height: 1;
            transition: color 0.15s, transform 0.15s;
        }
        .stars-input .star.active { color: #fbbf24; }
        .stars-input .star:hover { transform: scale(1.15); }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1e;
            border: 1px solid #2a2a30;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-control:focus { border-color: #6c5ce7; }
        .form-control::placeholder { color: #555; }
        textarea.form-control { resize: vertical; min-height: 80px; font-family: inherit; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            margin-top: 8px;
        }
        .btn-submit:active { transform: scale(0.97); opacity: 0.8; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1e;
            border: 1px solid #2a2a30;
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 14px;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            white-space: nowrap;
            z-index: 999;
        }
        .toast.show { opacity: 1; }

            width: 100%;
            padding: 12px;
            background: transparent;
            border: 1px solid #2a2a30;
            border-radius: 14px;
            color: #888;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 8px;
        }
        .load-more-btn:active { transform: scale(0.97); background: #1a1a1e; }

        function generateReviews(count) {
            const reviews = [];
            const usedCombos = new Set();

            for (let i = 0; i < count; i++) {
                let attempts = 0;
                let gift, text, nick, dateStr, rating;
                let unique = false;

                while (!unique && attempts < 50) {
                    attempts++;

                    // Выбор категории подарка
                    const rand = Math.random();
                    let giftPool;
                    if (rand < 0.82) {
                        giftPool = cheapGifts; // 82% дешёвые
                    } else if (rand < 0.93) {
                        giftPool = mediumGifts; // 11% средние
                    } else {
                        giftPool = expensiveGifts; // 7% дорогие
                    }

                    // Количество подарков (1-3)
                    const giftCount = Math.floor(Math.random() * 3) + 1;
                    const shuffled = [...giftPool].sort(() => 0.5 - Math.random());
                    const selected = [];
                    for (let j = 0; j < Math.min(giftCount, shuffled.length); j++) {
                        selected.push(shuffled[j]);
                    }
                    gift = selected.join(' + ');

                    // Рандомный ник
                    nick = nicknames[Math.floor(Math.random() * nicknames.length)];

                    // Рандомный текст
                    text = reviewTexts[Math.floor(Math.random() * reviewTexts.length)];

                    // Рандомная дата (июль 2026)
                    const day = Math.floor(Math.random() * 28) + 1;
                    const month = ['июля', 'августа', 'сентября'][Math.floor(Math.random() * 3)];
                    dateStr = `${day} ${month} 2026 г.`;

                    // Рейтинг (5 - 93%, 4 - 5%, 3 - 2%)
                    const r = Math.random();
                    if (r < 0.93) rating = 5;
                    else if (r < 0.98) rating = 4;
                    else if (r < 0.995) rating = 3;
                    else rating = 2;

                    const key = `${nick}|${gift}|${text}`;
                    if (!usedCombos.has(key)) {
                        usedCombos.add(key);
                        unique = true;
                    }
                }

                reviews.push({ nick, gift, text, date: dateStr, rating });
            }
            return reviews;
        }
