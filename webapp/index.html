            font-size: 13px;
            font-weight: 600;

        .rating-percent { font-size: 12px; color: #555; min-width: 38px; text-align: right; font-weight: 400; }

                    const shuffled = [...pool].sort(() => 0.5 - Math.random());
                    const selected = [];
                    for (let j = 0; j < Math.min(giftCount, shuffled.length); j++) {
                        selected.push(shuffled[j]);
                    }
                    gift = selected.join(' + ');

                    nick = nicknames[Math.floor(Math.random() * nicknames.length)];
                    text = reviewTexts[Math.floor(Math.random() * reviewTexts.length)];
                    
                    const day = Math.floor(Math.random() * 28) + 1;
                    const month = ['июля', 'августа'][Math.floor(Math.random() * 2)];
                    dateStr = `${day} ${month} 2026 г.`;

                    const r = Math.random();
                    if (r < 0.93) rating = 5;
                    else if (r < 0.98) rating = 4;
                    else if (r < 0.995) rating = 3;
                    else rating = 2;

                    const key = `${nick}|${gift}|${text}`;
                    if (!used.has(key)) {
                        used.add(key);
                        unique = true;
                    }
                }
                reviews.push({ nick, gift, text, date: dateStr, rating });
            }
            return reviews;
        }

        // ===== ПАГИНАЦИЯ =====
        const TOTAL_REVIEWS = 44739;
        const PER_PAGE = 50;
        let currentPage = 0;
        let allReviews = [];
        const container = document.getElementById('reviewsContainer');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const totalDisplay = document.getElementById('totalReviewsDisplay');

        // Генерируем все отзывы сразу (это может занять пару секунд)
        allReviews = generateAllReviews(TOTAL_REVIEWS);

        function renderPage(page) {
            const start = page * PER_PAGE;
            const end = Math.min(start + PER_PAGE, allReviews.length);
            const pageReviews = allReviews.slice(start, end);

            const html = pageReviews.map(r => `
                <div class="review-item">
                    <div class="review-header">
                        <span class="review-nick">${r.nick}</span>
                        <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                    </div>
                    <div class="review-gift">${r.gift}</div>
                    <div class="review-text">${r.text}</div>
                    <div class="review-date">${r.date}</div>
                </div>
            `).join('');

            container.innerHTML += html;

            // Обновляем счётчик
            const remaining = allReviews.length - end;
            totalDisplay.textContent = remaining > 0 ? remaining : 0;

            // Прячем кнопку если больше нет
            if (end >= allReviews.length) {
                loadMoreBtn.classList.add('hidden');
            } else {
                loadMoreBtn.classList.remove('hidden');
                const lang = currentLang || 'ru';
                const t = translations[lang];
                loadMoreBtn.textContent = `${t.loadMore} (${Math.min(remaining, PER_PAGE)})`;
            }
        }

        loadMoreBtn.addEventListener('click', () => {
            currentPage++;
            renderPage(currentPage);
        });

        // ===== ПЕРЕВОД =====
        const translations = {
            ru: {
                brandName: 'FunPay Market',
                brandSub: 'отзывы о сделках маркета',
                ratingLabel: 'Отзывы о сделках маркета',
                reviewsText: 'отзывов',
                formTitle: 'Ваш отзыв',
                formSub: 'Виден только вам · поддержка @FunPayToGift',
                labelRating: 'ОЦЕНКА',
                labelNick: 'НИК',
                labelGift: 'ПОДАРОК',
                labelText: 'ТЕКСТ',
                placeholderNick: 'Ваш никнейм',
                placeholderGift: 'название подарка',
                placeholderText: 'как прошла передача подарка',
                toast: '✅ Отзыв отправлен!',
                toastError: '⚠️ Выберите оценку (1-5)',
                toastErrorNick: '⚠️ Введите ник',
                toastErrorGift: '⚠️ Введите название подарка',
                toastErrorText: '⚠️ Напишите текст отзыва',
                btnSubmit: '📤 Отправить отзыв',
                loadMore: 'Загрузить еще'
            },
            en: {
                brandName: 'FunPay Market',
                brandSub: 'marketplace deal reviews',
                ratingLabel: 'Marketplace deal reviews',
                reviewsText: 'reviews',
                formTitle: 'Your review',
                formSub: 'Visible only to you · support @FunPayToGift',
                labelRating: 'RATING',
                labelNick: 'NICKNAME',
                labelGift: 'GIFT',
                labelText: 'TEXT',
                placeholderNick: 'Your nickname',
                placeholderGift: 'gift name',
                placeholderText: 'how was the gift transfer',
                toast: '✅ Review sent!',
                toastError: '⚠️ Please select a rating (1-5)',
                toastErrorNick: '⚠️ Enter your nickname',
                toastErrorGift: '⚠️ Enter the gift name',
                toastErrorText: '⚠️ Write your review text',
                btnSubmit: '📤 Send review',
                loadMore: 'Load more'
            }
        };

        let currentLang = 'ru';

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('brandName').textContent = t.brandName;
            document.getElementById('brandSub').textContent = t.brandSub;
            document.getElementById('ratingLabel').textContent = t.ratingLabel;
            document.getElementById('reviewsText').textContent = t.reviewsText;
            document.getElementById('formTitle').textContent = t.formTitle;
            document.getElementById('formSub').innerHTML = t.formSub;
            document.getElementById('labelRating').textContent = t.labelRating;
            document.getElementById('labelNick').textContent = t.labelNick;
            document.getElementById('labelGift').textContent = t.labelGift;
            document.getElementById('labelText').textContent = t.labelText;
            document.getElementById('nickInput').placeholder = t.placeholderNick;
            document.getElementById('giftInput').placeholder = t.placeholderGift;
            document.getElementById('textInput').placeholder = t.placeholderText;
            document.getElementById('submitBtn').textContent = t.btnSubmit;
            document.getElementById('langRu').classList.toggle('active', lang === 'ru');
            document.getElementById('langEn').classList.toggle('active', lang === 'en');
            
            // Обновляем кнопку загрузки
            const remaining = allReviews.length - ((currentPage + 1) * PER_PAGE);
            if (remaining > 0) {
                loadMoreBtn.textContent = `${t.loadMore} (${Math.min(remaining, PER_PAGE)})`;
            }
        }

        document.getElementById('langRu').addEventListener('click', () => setLanguage('ru'));
        document.getElementById('langEn').addEventListener('click', () => setLanguage('en'));

        // ===== ЗВЁЗДЫ =====
        const starsContainer = document.getElementById('starsContainer');
        const starElements = starsContainer.querySelectorAll('.star');
        let selectedRating = 0;

        starElements.forEach(star => {
            star.addEventListener('click', function() {
                const value = parseInt(this.dataset.value);
                selectedRating = value;
                starElements.forEach(s => {
                    s.classList.toggle('active', parseInt(s.dataset.value) <= value);
                });
            });
            star.addEventListener('mouseenter', function() {
                const value = parseInt(this.dataset.value);
                starElements.forEach(s => {
                    s.style.color = parseInt(s.dataset.value) <= value ? '#fbbf24' : '#333';
                });
            });
            star.addEventListener('mouseleave', function() {
                starElements.forEach(s => {
                    s.style.color = s.classList.contains('active') ? '#fbbf24' : '#333';
                });
            });
        });

        // ===== ОТПРАВКА =====
        const nickInput = document.getElementById('nickInput');
        const giftInput = document.getElementById('giftInput');
        const textInput = document.getElementById('textInput');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            if (user.username) nickInput.value = '@' + user.username;
            else if (user.first_name) nickInput.value = user.first_name;
        }

        submitBtn.addEventListener('click', function() {
            const t = translations[currentLang];
            const rating = selectedRating;
            const nick = nickInput.value.trim();
            const gift = giftInput.value.trim();
            const text = textInput.value.trim();

            if (rating === 0) { showToast(t.toastError); return; }
            if (!nick) { showToast(t.toastErrorNick); return; }
            if (!gift) { showToast(t.toastErrorGift); return; }
            if (!text) { showToast(t.toastErrorText); return; }

            const reviewData = { rating, nick, gift, text };
            tg.sendData(JSON.stringify(reviewData));
            showToast(t.toast);

            selectedRating = 0;
            starElements.forEach(s => s.classList.remove('active'));
            giftInput.value = '';
            textInput.value = '';
        });

        let toastTimeout;
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        tg.onEvent('viewportChanged', function() {
            tg.expand();
        });

        // ===== ЗАПУСК =====
        // Показываем первую страницу
        renderPage(0);
        console.log('FunPay WebApp loaded! 44,739 reviews ready.');
    </script>
</body>
</html>
