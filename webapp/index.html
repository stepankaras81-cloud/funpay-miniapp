<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FunPay - Отзывы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:ital,opsz,wght@0,14..32,100..900;1,14..32,100..900&display=swap" rel="stylesheet">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        @keyframes float {
            0%, 100% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(3deg); }
        }
        @keyframes twinkle {
            0%, 100% { opacity: 0.2; transform: scale(0.8); }
            50% { opacity: 1; transform: scale(1.2); }
        }
        @keyframes slideUp {
            from { opacity: 0; transform: translateY(30px); }
            to { opacity: 1; transform: translateY(0); }
        }
        @keyframes pop {
            0% { transform: scale(0.8); opacity: 0; }
            70% { transform: scale(1.05); }
            100% { transform: scale(1); opacity: 1; }
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            padding: 16px 16px 30px;
            overflow-x: hidden;
            position: relative;
        }

        .stars-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 0;
            overflow: hidden;
        }
        .star-particle {
            position: absolute;
            background: radial-gradient(circle, rgba(255,255,255,0.8), transparent 70%);
            border-radius: 50%;
            animation: twinkle 3s ease-in-out infinite;
        }

        .glow-orb {
            position: fixed;
            border-radius: 50%;
            filter: blur(80px);
            pointer-events: none;
            z-index: 0;
            animation: float 8s ease-in-out infinite;
        }
        .glow-orb.purple {
            width: 400px;
            height: 400px;
            background: rgba(108, 92, 231, 0.12);
            top: -100px;
            right: -100px;
        }
        .glow-orb.pink {
            width: 350px;
            height: 350px;
            background: rgba(236, 72, 153, 0.06);
            bottom: -80px;
            left: -80px;
            animation-delay: 2s;
        }
        .glow-orb.blue {
            width: 300px;
            height: 300px;
            background: rgba(56, 189, 248, 0.06);
            top: 40%;
            left: -120px;
            animation-delay: 4s;
        }

        .container {
            position: relative;
            z-index: 1;
            max-width: 500px;
            margin: 0 auto;
        }

        .header {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 24px;
            padding: 14px 18px;
            margin-bottom: 20px;
            box-shadow: 0 8px 40px rgba(0,0,0,0.5), inset 0 1px 0 rgba(255,255,255,0.05);
            animation: slideUp 0.6s ease;
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .avatar {
            width: 50px;
            height: 50px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 20px;
            font-weight: 700;
            color: #fff;
            flex-shrink: 0;
            overflow: hidden;
            box-shadow: 0 0 40px rgba(108, 92, 231, 0.2);
            transition: transform 0.3s ease;
        }
        .avatar:hover { transform: scale(1.05) rotate(-3deg); }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .header-center { text-align: center; flex: 1; padding: 0 12px; }
        .header-center .name {
            font-size: 20px;
            font-weight: 800;
            background: linear-gradient(135deg, #fff 40%, #a29bfe 70%, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            line-height: 1.2;
            letter-spacing: -0.5px;
        }
        .header-center .sub {
            font-size: 13px;
            color: rgba(255,255,255,0.4);
            margin-top: 2px;
            font-weight: 400;
            letter-spacing: 0.5px;
        }
        .header-center .sub span {
            background: linear-gradient(135deg, #a29bfe, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .lang-buttons {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }
        .lang-btn {
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 10px;
            padding: 4px 12px;
            color: rgba(255,255,255,0.3);
            font-size: 12px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }
        .lang-btn.active {
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border-color: rgba(108, 92, 231, 0.5);
            color: #fff;
            box-shadow: 0 0 30px rgba(108, 92, 231, 0.15);
        }
        .lang-btn:active { transform: scale(0.92); }

        .rating-card {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 28px;
            padding: 28px 20px 24px;
            margin-bottom: 16px;
            text-align: center;
            box-shadow: 0 8px 40px rgba(0,0,0,0.4), inset 0 1px 0 rgba(255,255,255,0.05);
            transition: transform 0.3s ease, box-shadow 0.3s ease;
            animation: slideUp 0.7s ease;
            position: relative;
            overflow: hidden;
        }
        .rating-card::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: conic-gradient(from 0deg, transparent, rgba(108,92,231,0.04), transparent, rgba(236,72,153,0.04), transparent);
            animation: spin 15s linear infinite;
            pointer-events: none;
        }
        @keyframes spin { 100% { transform: rotate(360deg); } }
        .rating-card:hover {
            transform: translateY(-3px) scale(1.01);
            box-shadow: 0 12px 50px rgba(0,0,0,0.5);
        }
        .rating-card .label {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.25);
            font-weight: 600;
            margin-bottom: 12px;
            position: relative;
            z-index: 1;
        }
        .rating-main {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 18px;
            flex-wrap: wrap;
            position: relative;
            z-index: 1;
        }
        .rating-number {
            font-size: 62px;
            font-weight: 800;
            line-height: 1;
            background: linear-gradient(135deg, #fff 30%, #a29bfe 60%, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .rating-stars {
            font-size: 30px;
            line-height: 1;
            color: #fbbf24;
            letter-spacing: 5px;
            text-shadow: 0 0 40px rgba(251, 191, 36, 0.12);
        }
        .rating-count {
            font-size: 15px;
            color: rgba(255,255,255,0.35);
            margin-top: 10px;
            font-weight: 500;
            position: relative;
            z-index: 1;
        }
        .rating-count span {
            background: linear-gradient(135deg, #a29bfe, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 700;
        }

        .rating-distribution {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 22px;
            padding: 18px 20px;
            margin-bottom: 20px;
            box-shadow: 0 8px 32px rgba(0,0,0,0.3);
            animation: slideUp 0.8s ease;
        }
        .rating-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 7px 0;
            border-bottom: 1px solid rgba(255,255,255,0.03);
            transition: all 0.2s ease;
        }
        .rating-row:hover { background: rgba(255,255,255,0.02); border-radius: 8px; padding-left: 8px; }
        .rating-row:last-child { border-bottom: none; }
        .rating-label {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            min-width: 48px;
            font-weight: 500;
        }
        .rating-bar-bg {
            flex: 1;
            height: 6px;
            background: rgba(255,255,255,0.05);
            border-radius: 4px;
            overflow: hidden;
        }
        .rating-bar-fill {
            height: 100%;
            border-radius: 4px;
            background: linear-gradient(90deg, #6c5ce7, #a29bfe, #f472b6);
            transition: width 1.2s cubic-bezier(0.34, 1.56, 0.64, 1);
            width: 0%;
        }
        .rating-count-number {
            font-size: 13px;
            color: rgba(255,255,255,0.35);
            min-width: 50px;
            text-align: right;
            font-weight: 500;
        }
        .rating-percent {
            font-size: 12px;
            color: rgba(255,255,255,0.15);
            min-width: 38px;
            text-align: right;
            font-weight: 400;
        }

        .section-title {
            font-size: 15px;
            font-weight: 700;
            color: rgba(255,255,255,0.8);
            margin-bottom: 4px;
            letter-spacing: -0.3px;
        }
        .section-sub {
            font-size: 13px;
            color: rgba(255,255,255,0.3);
            margin-bottom: 16px;
        }
        .section-sub a {
            background: linear-gradient(135deg, #a29bfe, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            text-decoration: none;
            font-weight: 500;
        }
        .form-group {
            margin-bottom: 16px;
        }
        .form-group label {
            display: block;
            font-size: 12px;
            font-weight: 600;
            color: rgba(255,255,255,0.35);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-bottom: 6px;
        }
        .stars-input {
            display: flex;
            gap: 10px;
            font-size: 40px;
            user-select: none;
            padding: 4px 0;
            flex-wrap: wrap;
            align-items: center;
        }
        .stars-input .star {
            color: rgba(255,255,255,0.06);
            cursor: pointer;
            font-size: 40px;
            line-height: 1;
            transition: all 0.25s cubic-bezier(0.34, 1.56, 0.64, 1);
            transform-origin: center;
        }
        .stars-input .star.active {
            color: #fbbf24;
            text-shadow: 0 0 40px rgba(251, 191, 36, 0.2);
            transform: scale(1.1);
        }
        .stars-input .star:hover {
            transform: scale(1.25);
            color: #fbbf24;
        }
        .rating-selected {
            font-size: 14px;
            color: rgba(255,255,255,0.5);
            margin-left: 12px;
            font-weight: 500;
            animation: pop 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            display: inline-block;
            padding: 4px 14px;
            border-radius: 20px;
            background: rgba(255,255,255,0.05);
            border: 1px solid rgba(255,255,255,0.06);
        }
        .rating-selected.active-text {
            color: #fbbf24;
            background: rgba(251, 191, 36, 0.08);
            border-color: rgba(251, 191, 36, 0.15);
        }
        .rating-selected .emoji {
            font-size: 18px;
        }

        .form-control {
            width: 100%;
            padding: 14px 18px;
            background: rgba(255,255,255,0.04);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 16px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: all 0.3s ease;
            font-family: 'Inter', sans-serif;
        }
        .form-control:focus {
            border-color: rgba(108, 92, 231, 0.4);
            box-shadow: 0 0 0 5px rgba(108, 92, 231, 0.08);
            background: rgba(255,255,255,0.06);
        }
        .form-control::placeholder { color: rgba(255,255,255,0.15); }
        textarea.form-control {
            resize: vertical;
            min-height: 80px;
            font-family: 'Inter', sans-serif;
        }

        .btn-submit {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            border-radius: 18px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.3s ease;
            box-shadow: 0 4px 30px rgba(108, 92, 231, 0.2);
            font-family: 'Inter', sans-serif;
            letter-spacing: 0.3px;
        }
        .btn-submit:active {
            transform: scale(0.96);
            box-shadow: 0 2px 15px rgba(108, 92, 231, 0.12);
        }
        .btn-submit:hover {
            box-shadow: 0 8px 45px rgba(108, 92, 231, 0.3);
            transform: translateY(-2px);
        }

        .reviews-section { margin-top: 20px; }
        .review-item {
            background: rgba(255,255,255,0.03);
            backdrop-filter: blur(20px);
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(255,255,255,0.04);
            border-radius: 20px;
            padding: 18px 20px;
            margin-bottom: 12px;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            box-shadow: 0 4px 20px rgba(0,0,0,0.15);
            animation: slideUp 0.5s ease;
        }
        .review-item:hover {
            border-color: rgba(108, 92, 231, 0.15);
            box-shadow: 0 8px 40px rgba(0,0,0,0.25);
            transform: translateY(-3px) scale(1.005);
            background: rgba(255,255,255,0.05);
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .review-nick {
            font-size: 16px;
            font-weight: 700;
            color: #fff;
            letter-spacing: -0.2px;
        }
        .review-stars {
            color: #fbbf24;
            font-size: 14px;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(251, 191, 36, 0.06);
        }
        .review-gift {
            font-size: 13px;
            background: linear-gradient(135deg, #a29bfe, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            font-weight: 500;
            margin-bottom: 6px;
        }
        .review-text {
            font-size: 14px;
            color: rgba(255,255,255,0.65);
            line-height: 1.6;
            margin-bottom: 8px;
        }
        .review-date {
            font-size: 12px;
            color: rgba(255,255,255,0.15);
            text-align: right;
            font-weight: 400;
            letter-spacing: 0.3px;
        }
        .review-item.user-review {
            border-color: rgba(108, 92, 231, 0.3);
            background: rgba(108, 92, 231, 0.06);
            box-shadow: 0 0 50px rgba(108, 92, 231, 0.04);
        }
        .review-item.user-review .review-nick {
            background: linear-gradient(135deg, #a29bfe, #f472b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .review-item.user-review .review-gift {
            -webkit-text-fill-color: #fbbf24;
            color: #fbbf24;
        }
        .review-item.user-review .review-text {
            color: rgba(255,255,255,0.85);
        }

        .load-more-btn {
            width: 100%;
            padding: 14px;
            background: rgba(255,255,255,0.03);
            border: 1px solid rgba(255,255,255,0.06);
            border-radius: 18px;
            color: rgba(255,255,255,0.35);
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 12px;
            font-family: 'Inter', sans-serif;
        }
        .load-more-btn:hover {
            background: rgba(255,255,255,0.06);
            border-color: rgba(108, 92, 231, 0.2);
            color: #fff;
        }
        .load-more-btn:active { transform: scale(0.96); }
        .load-more-btn.hidden { display: none; }

        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%) translateY(20px);
            background: rgba(20,20,30,0.95);
            backdrop-filter: blur(30px);
            -webkit-backdrop-filter: blur(30px);
            border: 1px solid rgba(255,255,255,0.06);
            padding: 14px 32px;
            border-radius: 18px;
            font-size: 14px;
            color: #fff;
            opacity: 0;
            transition: all 0.4s cubic-bezier(0.34, 1.56, 0.64, 1);
            pointer-events: none;
            box-shadow: 0 8px 50px rgba(0,0,0,0.6);
            white-space: nowrap;
            z-index: 999;
        }
        .toast.show {
            opacity: 1;
            transform: translateX(-50%) translateY(0);
        }
    </style>
</head>
<body>

    <div class="stars-container" id="starsContainer"></div>

    <div class="glow-orb purple"></div>
    <div class="glow-orb pink"></div>
    <div class="glow-orb blue"></div>

    <div class="container">

        <div class="header">
            <div class="header-top">
                <div class="avatar"><img id="avatarImg" src="https://i.postimg.cc/Bj4QzQYD/photo-5228734607275007909-y.jpg" alt="Avatar"></div>
                <div class="header-center">
                    <div class="name" id="brandName">FunPay Market</div>
                    <div class="sub" id="brandSub">отзывы о сделках маркета</div>
                </div>
                <div class="lang-buttons">
                    <button class="lang-btn active" data-lang="ru" id="langRu">RU</button>
                    <button class="lang-btn" data-lang="en" id="langEn">EN</button>
                </div>
            </div>
        </div>

        <div class="rating-card">
            <div class="label" id="ratingLabel">Отзывы о сделках маркета</div>
            <div class="rating-main">
                <span class="rating-number">4.9</span>
                <span class="rating-stars">★★★★★</span>
            </div>
            <div class="rating-count"><span id="totalReviewsDisplay">44 759</span> <span id="reviewsText">отзывов</span></div>
        </div>

        <div class="rating-distribution">
            <div class="rating-row"><span class="rating-label">5 ★</span><div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 93%;"></div></div><span class="rating-count-number">42 412</span><span class="rating-percent">93%</span></div>
            <div class="rating-row"><span class="rating-label">4 ★</span><div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 4%;"></div></div><span class="rating-count-number">2 150</span><span class="rating-percent">4%</span></div>
            <div class="rating-row"><span class="rating-label">3 ★</span><div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 2%;"></div></div><span class="rating-count-number">195</span><span class="rating-percent">2%</span></div>
            <div class="rating-row"><span class="rating-label">2 ★</span><div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 1%;"></div></div><span class="rating-count-number">2</span><span class="rating-percent">1%</span></div>
            <div class="rating-row"><span class="rating-label">1 ★</span><div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 0%;"></div></div><span class="rating-count-number">0</span><span class="rating-percent">0%</span></div>
        </div>

        <div class="section-title" id="formTitle">Ваш отзыв</div>
        <div class="section-sub" id="formSub">Виден только вам · поддержка <a href="https://t.me/FunPayToGift">@FunPayToGift</a></div>

        <div class="form-group">
            <label id="labelRating">ОЦЕНКА</label>
            <div class="stars-input" id="starsContainer">
                <span class="star" data-value="1">⭐</span>
                <span class="star" data-value="2">⭐</span>
                <span class="star" data-value="3">⭐</span>
                <span class="star" data-value="4">⭐</span>
                <span class="star" data-value="5">⭐</span>
                <span class="rating-selected" id="ratingSelected">0 ✩</span>
            </div>
        </div>

        <div class="form-group">
            <label id="labelNick">НИК</label>
            <input class="form-control" id="nickInput" placeholder="Ваш никнейм" maxlength="30">
        </div>

        <div class="form-group">
            <label id="labelGift">ПОДАРОК</label>
            <input class="form-control" id="giftInput" placeholder="Название подарка" maxlength="50">
        </div>

        <div class="form-group">
            <label id="labelText">ТЕКСТ</label>
            <textarea class="form-control" id="textInput" placeholder="Опишите сделку" maxlength="500"></textarea>
        </div>

        <button class="btn-submit" id="submitBtn">Отправить отзыв</button>

        <div class="reviews-section" id="reviewsContainer"></div>
        <button class="load-more-btn" id="loadMoreBtn">Загрузить еще 50 отзывов</button>

        <div class="toast" id="toast">✅ Отзыв отправлен!</div>
    </div>

    <script>
        (function createStars() {
            const container = document.getElementById('starsContainer');
            for (let i = 0; i < 60; i++) {
                const star = document.createElement('div');
                star.className = 'star-particle';
                const size = Math.random() * 4 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                star.style.left = Math.random() * 100 + '%';
                star.style.top = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 5 + 's';
                star.style.animationDuration = (Math.random() * 4 + 2) + 's';
                container.appendChild(star);
            }
        })();

        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setBackgroundColor('#0a0a0f');
        tg.setHeaderColor('#0a0a0f');

        const BASE_TOTAL = 44759;
        const STORAGE_KEY = 'funpay_user_review';
        const STORAGE_TOTAL_KEY = 'funpay_total_reviews';
        const STORAGE_ALL_REVIEWS_KEY = 'funpay_all_reviews_fixed';
        const RATING_SELECTED = document.getElementById('ratingSelected');

        function loadUserReview() {
            try { const saved = localStorage.getItem(STORAGE_KEY); if (saved) return JSON.parse(saved); } catch (e) {}

            try { const saved = localStorage.getItem(STORAGE_TOTAL_KEY); if (saved) return parseInt(saved); } catch (e) {}
            return BASE_TOTAL;
        }
        function loadAllReviews() {
            try {
                const saved = localStorage.getItem(STORAGE_ALL_REVIEWS_KEY);
                if (saved) { const data = JSON.parse(saved); if (data && data.length > 0) return data; }
            } catch (e) {}
            return null;
        }
        function saveUserReview(review) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(review)); } catch (e) {} }
        function saveTotalReviews(total) { try { localStorage.setItem(STORAGE_TOTAL_KEY, String(total)); } catch (e) {} }
        function saveAllReviews(reviews) { try { localStorage.setItem(STORAGE_ALL_REVIEWS_KEY, JSON.stringify(reviews)); } catch (e) {} }

        function getRandomDate() { const day = Math.floor(Math.random() * 12) + 1; return `${day} июля 2026 г.`; }

        function generateUniqueReviews() {
            const reviews = [];
            const usedCombos = new Set();
            let longIndex = 0,
                shortIndex = 0;
            const shuffledNicks = [...UNIQUE_NICKS].sort(() => 0.5 - Math.random());
            for (let i = 0; i < shuffledNicks.length; i++) {
                const nick = shuffledNicks[i];
                const gift = GIFTS[i % GIFTS.length];
                let text;
                if (i % 7 === 0 || i % 9 === 0 || i % 5 === 0) {
                    text = LONG_TEXTS[longIndex % LONG_TEXTS.length];
                    longIndex++;
                } else {
                    text = SHORT_TEXTS[shortIndex % SHORT_TEXTS.length];
                    shortIndex++;
                }
                const key = `${nick}|${gift}|${text}`;
                if (!usedCombos.has(key)) {
                    usedCombos.add(key);
                    reviews.push({ nick, gift, text, date: getRandomDate(), rating: Math.random() > 0.1 ? 5 : 4 });
                }
            }
            let counter = 0;
            let longIndex2 = 0,
                shortIndex2 = 0;
            while (reviews.length < 1000) {
                const nick = UNIQUE_NICKS[counter % UNIQUE_NICKS.length] + '_' + counter;
                const gift = GIFTS[counter % GIFTS.length];
                let text;
                if (counter % 7 === 0 || counter % 9 === 0 || counter % 5 === 0) {
                    text = LONG_TEXTS[longIndex2 % LONG_TEXTS.length];
                    longIndex2++;
                } else {
                    text = SHORT_TEXTS[shortIndex2 % SHORT_TEXTS.length];
                    shortIndex2++;
                }
                const key = `${nick}|${gift}|${text}`;
                if (!usedCombos.has(key)) {
                    usedCombos.add(key);
                    reviews.push({ nick, gift, text, date: getRandomDate(), rating: Math.random() > 0.1 ? 5 : 4 });
                }
                counter++;
            }
            return reviews;
        }

        const PER_PAGE = 50;
        let currentPage = 0;
        let allReviews = [];
        let userReview = null;
        let currentTotal = BASE_TOTAL;
        const container = document.getElementById('reviewsContainer');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const totalDisplay = document.getElementById('totalReviewsDisplay');

        userReview = loadUserReview();
        currentTotal = loadTotalReviews();
        const savedReviews = loadAllReviews();
        if (savedReviews) { allReviews = savedReviews; } else { allReviews = generateUniqueReviews();
            saveAllReviews(allReviews); }

        function renderPage(page, showUserReview = false) {
            const start = page * PER_PAGE;
            const end = Math.min(start + PER_PAGE, allReviews.length);
            let pageReviews = allReviews.slice(start, end);
            let reviewsToShow = [...pageReviews];
            if (showUserReview && userReview && page === 0) { reviewsToShow = [userReview, ...reviewsToShow]; }
            const html = reviewsToShow.map(r => {
                const isUser = r === userReview;
                return `
                    <div class="review-item ${isUser ? 'user-review' : ''}">
                        <div class="review-header">
                            <span class="review-nick">${r.nick}</span>
                            <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                        </div>
                        <div class="review-gift">${r.gift}</div>
                        <div class="review-text">${r.text}</div>
                        <div class="review-date">${r.date}</div>
                    </div>
                `;
            }).join('');
            if (page === 0) { container.innerHTML = html; } else { container.innerHTML += html; }
            totalDisplay.textContent = currentTotal;
            const remaining = allReviews.length - end;
            if (end >= allReviews.length && !userReview) { loadMoreBtn.classList.add('hidden'); } else if (end >= allReviews
                    .length && userReview) { if (page === 0) { loadMoreBtn.classList.add('hidden'); } else { loadMoreBtn

                loadMoreBtn.textContent = `Загрузить еще (${Math.min(remaining, PER_PAGE)})`; }

            ][now.getMonth()];
            const year = now.getFullYear();
            const dateStr = `${day} ${month} ${year} г.`;
            userReview = { nick, gift, text, date: dateStr, rating, isUser: true };
            currentTotal = currentTotal + 1;

            saveTotalReviews(currentTotal);
            currentPage = 0;
            container.innerHTML = '';

        const starsContainer = document.getElementById('starsContainer');
        const starElements = starsContainer.querySelectorAll('.star');
        let selectedRating = 0;

        starElements.forEach(star => {
            star.addEventListener('click', function() {
                const value = parseInt(this.dataset.value);
                selectedRating = value;
                starElements.forEach(s => {
                    const val = parseInt(s.dataset.value);
                    if (val <= value) {
                        s.classList.add('active');
                    } else {
                        s.classList.remove('active');
                    }
                });
                updateRatingDisplay(value);
            });

            star.addEventListener('mouseenter', function() {
                const value = parseInt(this.dataset.value);
                starElements.forEach(s => {
                    const val = parseInt(s.dataset.value);
                    s.style.color = val <= value ? '#fbbf24' : 'rgba(255,255,255,0.06)';
                });
            });

            star.addEventListener('mouseleave', function() {
                starElements.forEach(s => {
                    if (s.classList.contains('active')) {
                        s.style.color = '#fbbf24';
                    } else {
                        s.style.color = 'rgba(255,255,255,0.06)';
                    }
                });
            });
        });

        let toastTimeout;

        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => { toast.classList.remove('show'); }, 3000);
