<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>FunPay - Отзывы</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
            background: #0f0f12;
            color: #ffffff;
            min-height: 100vh;
            padding: 16px 16px 30px;
        }
        .header {
            display: flex;
            flex-direction: column;
            align-items: center;
            margin-bottom: 20px;
            padding: 12px 16px;
            background: #1a1a1e;
            border-radius: 16px;
            border: 1px solid #2a2a30;
        }
        .header-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            width: 100%;
            margin-bottom: 4px;
        }
        .avatar {
            width: 44px;
            height: 44px;
            border-radius: 50%;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 18px;
            font-weight: bold;
            color: #fff;
            flex-shrink: 0;
            overflow: hidden;
        }
        .avatar img { width: 100%; height: 100%; object-fit: cover; }
        .header-center { text-align: center; flex: 1; }
        .header-center .name { font-size: 18px; font-weight: 700; color: #fff; line-height: 1.2; }
        .header-center .sub { font-size: 13px; color: #888; margin-top: 2px; }
        .header-center .sub span { color: #6c5ce7; }
        .lang-buttons { display: flex; gap: 6px; flex-shrink: 0; }
        .lang-btn {
            background: transparent;
            border: 1px solid #2a2a30;
            border-radius: 8px;
            padding: 4px 12px;
            color: #666;
            font-size: 13px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
        }
        .lang-btn.active { background: #6c5ce7; border-color: #6c5ce7; color: #fff; }
        .lang-btn:active { transform: scale(0.95); }

        .rating-card {
            background: linear-gradient(135deg, #1a1a1e, #22222a);
            border-radius: 20px;
            padding: 24px 20px;
            margin-bottom: 16px;
            border: 1px solid #2a2a30;
            text-align: center;
        }
        .rating-card .label { font-size: 13px; color: #888; text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
        .rating-main { display: flex; align-items: center; justify-content: center; gap: 12px; }
        .rating-number { font-size: 48px; font-weight: 800; color: #fff; line-height: 1; }
        .rating-stars { font-size: 28px; line-height: 1; color: #fbbf24; letter-spacing: 2px; }
        .rating-count { font-size: 15px; color: #888; margin-top: 6px; }
        .rating-count span { color: #6c5ce7; font-weight: 600; }

        .rating-distribution {
            background: #1a1a1e;
            border-radius: 16px;
            padding: 16px 20px;
            margin-bottom: 20px;
            border: 1px solid #2a2a30;
        }
        .rating-row {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 6px 0;
            border-bottom: 1px solid #25252b;
        }
        .rating-row:last-child { border-bottom: none; }
        .rating-label { font-size: 14px; color: #aaa; min-width: 45px; font-weight: 500; }
        .rating-bar-bg { flex: 1; height: 6px; background: #25252b; border-radius: 4px; overflow: hidden; }
        .rating-bar-fill { height: 100%; border-radius: 4px; background: linear-gradient(90deg, #6c5ce7, #a29bfe); transition: width 0.6s ease; }
        .rating-count-number { font-size: 13px; color: #888; min-width: 50px; text-align: right; font-weight: 500; }
        .rating-percent { font-size: 12px; color: #555; min-width: 38px; text-align: right; font-weight: 400; }

        .reviews-section { margin-top: 20px; }
        .review-item {
            background: #1a1a1e;
            border-radius: 16px;
            padding: 16px 18px;
            margin-bottom: 12px;
            border: 1px solid #2a2a30;
            transition: border-color 0.2s;
        }
        .review-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 4px;
        }
        .review-nick { font-size: 16px; font-weight: 600; color: #fff; }
        .review-stars { color: #fbbf24; font-size: 14px; letter-spacing: 2px; }
        .review-gift { font-size: 13px; color: #6c5ce7; font-weight: 500; margin-bottom: 6px; }
        .review-text { font-size: 14px; color: #aaa; line-height: 1.5; margin-bottom: 8px; }
        .review-date { font-size: 12px; color: #555; text-align: right; }

        .section-title { font-size: 14px; font-weight: 600; color: #aaa; margin-bottom: 4px; }
        .section-sub { font-size: 13px; color: #666; margin-bottom: 16px; }
        .section-sub a { color: #6c5ce7; text-decoration: none; }
        .form-group { margin-bottom: 16px; }
        .form-group label { display: block; font-size: 13px; font-weight: 600; color: #ccc; margin-bottom: 6px; }

        .stars-input {
            display: flex;
            gap: 10px;
            font-size: 40px;
            user-select: none;
            padding: 8px 0;
        }
        .stars-input .star {
            color: #333;
            cursor: pointer;
            font-size: 40px;
            line-height: 1;
            transition: color 0.15s, transform 0.15s;
        }
        .stars-input .star.active { color: #fbbf24; }
        .stars-input .star:hover { transform: scale(1.15); }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            background: #1a1a1e;
            border: 1px solid #2a2a30;
            border-radius: 12px;
            color: #fff;
            font-size: 15px;
            outline: none;
            transition: border-color 0.2s;
        }
        .form-control:focus { border-color: #6c5ce7; }
        .form-control::placeholder { color: #555; }
        textarea.form-control { resize: vertical; min-height: 80px; font-family: inherit; }
        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #6c5ce7, #a29bfe);
            border: none;
            border-radius: 14px;
            color: #fff;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.15s, opacity 0.15s;
            margin-top: 8px;
        }
        .btn-submit:active { transform: scale(0.97); opacity: 0.8; }
        .toast {
            position: fixed;
            bottom: 30px;
            left: 50%;
            transform: translateX(-50%);
            background: #1a1a1e;
            border: 1px solid #2a2a30;
            padding: 12px 24px;
            border-radius: 14px;
            font-size: 14px;
            color: #fff;
            opacity: 0;
            transition: opacity 0.3s;
            pointer-events: none;
            backdrop-filter: blur(10px);
            box-shadow: 0 8px 30px rgba(0,0,0,0.6);
            white-space: nowrap;
            z-index: 999;
        }
        .toast.show { opacity: 1; }

        .load-more-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 1px solid #2a2a30;
            border-radius: 14px;
            color: #888;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            margin-top: 12px;
        }
        .load-more-btn:active { transform: scale(0.97); background: #1a1a1e; }
        .load-more-btn.hidden { display: none; }
    </style>
</head>
<body>

    <!-- ХЕДЕР -->
    <div class="header">
        <div class="header-top">
            <div class="avatar"><img id="avatarImg" src="https://i.postimg.cc/Bj4QzQYD/photo-5228734607275007909-y.jpg" alt="Avatar"></div>
            <div class="header-center">
                <div class="name" id="brandName">FunPay Market</div>
                <div class="sub" id="brandSub">отзывы о сделках маркета</div>
            </div>
            <div class="lang-buttons">
                <button class="lang-btn active" data-lang="ru" id="langRu">RU</button>
                <button class="lang-btn" data-lang="en" id="langEn">EN</button>
            </div>
        </div>
    </div>

    <!-- РЕЙТИНГ -->
    <div class="rating-card">
        <div class="label" id="ratingLabel">Отзывы о сделках маркета</div>
        <div class="rating-main">
            <span class="rating-number">4.9</span>
            <span class="rating-stars">★★★★★</span>
        </div>
        <div class="rating-count"><span id="totalReviewsDisplay">44 759</span> <span id="reviewsText">отзывов</span></div>
    </div>

    <!-- РАСПРЕДЕЛЕНИЕ -->
    <div class="rating-distribution">
        <div class="rating-row"><span class="rating-label">5 ★</span><div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 93%;"></div></div><span class="rating-count-number">42 412</span><span class="rating-percent">93%</span></div>
        <div class="rating-row"><span class="rating-label">4 ★</span><div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 4%;"></div></div><span class="rating-count-number">2 150</span><span class="rating-percent">4%</span></div>
        <div class="rating-row"><span class="rating-label">3 ★</span><div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 2%;"></div></div><span class="rating-count-number">195</span><span class="rating-percent">2%</span></div>
        <div class="rating-row"><span class="rating-label">2 ★</span><div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 1%;"></div></div><span class="rating-count-number">2</span><span class="rating-percent">1%</span></div>
        <div class="rating-row"><span class="rating-label">1 ★</span><div class="rating-bar-bg"><div class="rating-bar-fill" style="width: 0%;"></div></div><span class="rating-count-number">0</span><span class="rating-percent">0%</span></div>
    </div>

    <!-- ФОРМА ОТЗЫВА -->
    <div class="section-title" id="formTitle">Ваш отзыв</div>
    <div class="section-sub" id="formSub">Виден только вам · поддержка <a href="https://t.me/FunPayToGift">@FunPayToGift</a></div>

    <div class="form-group">
        <label id="labelRating">ОЦЕНКА</label>
        <div class="stars-input" id="starsContainer">
            <span class="star" data-value="1">⭐</span>
            <span class="star" data-value="2">⭐</span>
            <span class="star" data-value="3">⭐</span>
            <span class="star" data-value="4">⭐</span>
            <span class="star" data-value="5">⭐</span>
        </div>
    </div>

    <div class="form-group">
        <label id="labelNick">НИК</label>
        <input class="form-control" id="nickInput" placeholder="Ваш никнейм" maxlength="30">
    </div>

    <div class="form-group">
        <label id="labelGift">ПОДАРОК</label>
        <input class="form-control" id="giftInput" placeholder="название подарка" maxlength="50">
    </div>

    <div class="form-group">
        <label id="labelText">ТЕКСТ</label>
        <textarea class="form-control" id="textInput" placeholder="как прошла передача подарка" maxlength="500"></textarea>
    </div>

    <button class="btn-submit" id="submitBtn">📤 Отправить отзыв</button>

    <!-- БЛОК ОТЗЫВОВ -->
    <div class="reviews-section" id="reviewsContainer"></div>
    <button class="load-more-btn" id="loadMoreBtn">Загрузить еще 50 отзывов</button>

    <div class="toast" id="toast">✅ Отзыв отправлен!</div>

    <script>
        const tg = window.Telegram.WebApp;
        tg.expand();
        tg.setBackgroundColor('#0f0f12');
        tg.setHeaderColor('#0f0f12');

        const TOTAL_REVIEWS = 44759;

        // ===== УНИКАЛЬНЫЕ НИКИ =====
        const UNIQUE_NICKS = [
            'teti|su', 'marishka', 'katya', 'kris', 'levan🤝🏻',
            'сексі', 'евелинка', 'shlokas', 'бетатестер3000',
            'Rahul', 'Splitov', '@kawrkw', 'z1rp', 'аномалия.',
            'LUNAROV', 'Великий', 'ЛИКОДОНОВ', 'bittersuite', 'Чувашия',
            'Trollaccounts', 'aliaska', 'sqw111zzyy', 'Iloniks', 'xifuni',
            'Zaken', 'Александра', 'Linushecka', 'OTORF II', '119',
            'Mm', 'Eric #NFT', 'auclys', 'этилов.vk', 'Xsess',
            'изи бриджи', 'deanonist', 'Wters', 'современность', 'bxbsu',
            'Spirid', 'jostle', 'HEADEKBAT', 'Polinaa', 'Миланянаа',
            'Xunutu', 'POWERPOINT', 'JesterAct', 'Пиздец', 'pankiho',
            'atreideslolly', 'lvryr', 'Далекий Нептун', 'Weztik', 'Momo',
            '9grams', 'хелсов', 'programdata', 'de la 🎄', 'Kay',
            'Улита', 'Craiz', 'дед', 'FunPay', 'GiftMaster',
            'ТопСеллер', 'Гарант', 'Менеджер', 'Покупатель', 'Продавец',
            'skywer', 'doner', 'Лиза', 'emma', 'эля',
            'глистый', 'maonic', 'Ssss', 'zahra', 'ZETIK',
            'Lili Alvirovna', 'Виолетта', 'derssam', 'Vkmuso', 'Ева',
            'Керра', 'Абама', 'sdoret', 'ye', 'cry at me',
            'Xiril', 'Ульяна', 'Vyacheslav', 'DELURTY', 'MARLON',
            'Cyan', 'Савелий', 'Ywiii', 'mrPerignon', 'dotmoovs',
            'Vicky', 'garixov', 'W1ar4ik', 'Півной Уникс', 'SOMUPA',
            'Evelina', 'bottega', 'leh', 'Wayne', 'ILD',
            's', 'faziaz', 'Livnite', 'Playerok Deals', 'm-',
            'Ifa', 'Knuazhe', 'Рвасик-маму ебал', 'KASRA'
        ];

        // ===== ПОДАРКИ =====
        const GIFTS = [
            'Love Potion', 'Bunny Muffin', 'Jelly Bunny', 'Sakura Flower',
            'Crystal Ball', 'Signet Ring', 'Whip Cupcake',
            'Vice Cream + Chill Flame + Neko Helmet', 'Moon Pendant',
            'Eternal Rose + Lunar Snake + Pet Snake', 'Lunar Snake',
            'Berry Box + Genie Lamp', 'Lunar Snake + Gem Signet',
            'Winter Wreath', 'Santa Hat', 'Whip Cupcake + Heart Locket',
            'Light Sword + Berry Box', 'Love Potion + Toy Bear + Santa Hat',
            'Top Hat + Bunny Muffin', 'Genie Lamp', 'Hanging Star',
            'Nail Bracelet + Hypno Lollipop', 'Lol Pop', 'Astral Shard',
            'Evil Eye', 'Love Potion + Diamond Ring', 'Snow Globe',
            'Hypno Lollipop', 'B-Day Candle + Candy Cane', 'Nail Bracelet',
            'Candy Cane', 'Whip Cupcake + Love Potion', 'Tama Gadget + Spiced Wine',
            'Jester Hat', 'Diamond Ring + Top Hat', 'Toy Bear',
            'lon Gem', 'Lunar Snake + Pet Snake + Spy Agaric', 'Santa Hat',
            'Trapped Heart', 'Crystal Ball + Whip Cupcake',
            'Berry Box', 'Clover Pin', 'Cupid Charm', 'Spring Basket',
            'Eternal Rose', 'Light Sword', 'Snake Box', 'Chill Flame',
            'Homemade Cake', 'Liberty Figure', 'Swag Bag', 'Big Year'
        ];

        // ===== КОРОТКИЕ ОТЗЫВЫ (1-2 слова) - 50% =====
        const SHORT_TEXTS = [
            'норм', 'топ', 'быстро', '10/10', 'советую',
            'fast', 'кайфы', 'топчик', 'крутак', 'имбуличка',
            'лучшие', 'ИМБА', '<3', 'хорошо', 'отлично',
            'супер', 'круто', 'ок', '+rep', '+реп',
            'всё ок', 'четко', 'быстрооо', 'респект'
        ];

        // ===== СРЕДНИЕ/ДЛИННЫЕ ОТЗЫВЫ (все УНИКАЛЬНЫЕ) =====
        const LONG_TEXTS = [
            'продавец оплатил, я передал подарок менеджеру, деньги пришли',
            'все прошло хорошо',
            'быстро и качественно, спасибо',
            'помогли вывести деньги, все четко',
            'лучший сервис',
            'быстро закрыли, доволен',
            'все супер, буду еще пользоваться',
            'отличный сервис',
            'сначала переживал, но все прошло отлично',
            'крутой бот, все четко работает',
            'проверено временем',
            'оплатил без вопросов, передал подарок, деньги пришли',
            'продавец зашёл, оплатил, я передал, всё ок',
            'доволен сделкой, все прошло гладко',
            'быстро, надежно, спасибо менеджеру',
            'все честно, оплата пришла',
            'сначала думал скам, но все четко',
            'продавец супер, все четко',
            'оплата на карту пришла быстро',
            'доволен, буду еще брать',
            'лучший маркет',
            'сделка чистая, рекамендую',
            'зашли, оплатили, передали, деньги на карте',
            'всё четко, без кидка',
            'рекомендую всем',
            'отличная сделка',
            'всё прошло супер',
            'быстро и надежно',
            'спасибо за сделку',
            'все ок, рекомендую',
            'качественный сервис',
            'все понравилось'
        ];

        // ===== ГЕНЕРАЦИЯ УНИКАЛЬНЫХ ОТЗЫВОВ =====
        function generateUniqueReviews() {
            const reviews = [];
            const usedCombos = new Set();
            
            // Перемешиваем ники для разнообразия
            const shuffledNicks = [...UNIQUE_NICKS].sort(() => 0.5 - Math.random());
            
            for (let i = 0; i < shuffledNicks.length; i++) {
                const nick = shuffledNicks[i];
                const giftIndex = i % GIFTS.length;
                const gift = GIFTS[giftIndex];
                
                // 50% коротких, 50% длинных
                let text;
                if (i % 2 === 0) {
                    text = SHORT_TEXTS[i % SHORT_TEXTS.length];
                } else {
                    text = LONG_TEXTS[i % LONG_TEXTS.length];
                }
                
                const key = `${nick}|${gift}|${text}`;
                
                if (!usedCombos.has(key)) {
                    usedCombos.add(key);
                    
                    const day = Math.floor(Math.random() * 28) + 1;
                    const month = ['июня', 'июля', 'августа', 'сентября'][Math.floor(Math.random() * 4)];
                    const date = `${day} ${month} 2026 г.`;
                    const rating = Math.random() > 0.1 ? 5 : 4;
                    
                    reviews.push({
                        nick: nick,
                        gift: gift,
                        text: text,
                        date: date,
                        rating: rating
                    });
                }
            }
            
            // Добираем до 1200+ уникальных отзывов
            let counter = 0;
            while (reviews.length < 1200) {
                const nick = UNIQUE_NICKS[counter % UNIQUE_NICKS.length] + '_' + counter;
                const gift = GIFTS[counter % GIFTS.length];
                
                let text;
                if (counter % 2 === 0) {
                    text = SHORT_TEXTS[counter % SHORT_TEXTS.length];
                } else {
                    text = LONG_TEXTS[counter % LONG_TEXTS.length];
                }
                
                const key = `${nick}|${gift}|${text}`;
                
                if (!usedCombos.has(key)) {
                    usedCombos.add(key);
                    const day = Math.floor(Math.random() * 28) + 1;
                    const month = ['июня', 'июля', 'августа', 'сентября'][Math.floor(Math.random() * 4)];
                    const date = `${day} ${month} 2026 г.`;
                    const rating = Math.random() > 0.1 ? 5 : 4;
                    
                    reviews.push({
                        nick: nick,
                        gift: gift,
                        text: text,
                        date: date,
                        rating: rating
                    });
                }
                counter++;
            }
            
            return reviews;
        }

        // ===== ПАГИНАЦИЯ =====
        const PER_PAGE = 50;
        let currentPage = 0;
        let allReviews = [];
        const container = document.getElementById('reviewsContainer');
        const loadMoreBtn = document.getElementById('loadMoreBtn');
        const totalDisplay = document.getElementById('totalReviewsDisplay');

        allReviews = generateUniqueReviews();

        function renderPage(page) {
            const start = page * PER_PAGE;
            const end = Math.min(start + PER_PAGE, allReviews.length);
            const pageReviews = allReviews.slice(start, end);

            const html = pageReviews.map(r => `
                <div class="review-item">
                    <div class="review-header">
                        <span class="review-nick">${r.nick}</span>
                        <span class="review-stars">${'★'.repeat(r.rating)}${'☆'.repeat(5 - r.rating)}</span>
                    </div>
                    <div class="review-gift">${r.gift}</div>
                    <div class="review-text">${r.text}</div>
                    <div class="review-date">${r.date}</div>
                </div>
            `).join('');

            container.innerHTML += html;
            totalDisplay.textContent = TOTAL_REVIEWS;

            const remaining = allReviews.length - end;
            if (end >= allReviews.length) {
                loadMoreBtn.classList.add('hidden');
            } else {
                loadMoreBtn.classList.remove('hidden');
                loadMoreBtn.textContent = `Загрузить еще (${Math.min(remaining, PER_PAGE)})`;
            }
        }

        loadMoreBtn.addEventListener('click', () => {
            currentPage++;
            renderPage(currentPage);
        });

        // ===== ПЕРЕВОД =====
        const translations = {
            ru: {
                brandName: 'FunPay Market',
                brandSub: 'отзывы о сделках маркета',
                ratingLabel: 'Отзывы о сделках маркета',
                reviewsText: 'отзывов',
                formTitle: 'Ваш отзыв',
                formSub: 'Виден только вам · поддержка @FunPayToGift',
                labelRating: 'ОЦЕНКА',
                labelNick: 'НИК',
                labelGift: 'ПОДАРОК',
                labelText: 'ТЕКСТ',
                placeholderNick: 'Ваш никнейм',
                placeholderGift: 'название подарка',
                placeholderText: 'как прошла передача подарка',
                toast: '✅ Отзыв отправлен!',
                toastError: '⚠️ Выберите оценку (1-5)',
                toastErrorNick: '⚠️ Введите ник',
                toastErrorGift: '⚠️ Введите название подарка',
                toastErrorText: '⚠️ Напишите текст отзыва',
                btnSubmit: '📤 Отправить отзыв',
                loadMore: 'Загрузить еще'
            },
            en: {
                brandName: 'FunPay Market',
                brandSub: 'marketplace deal reviews',
                ratingLabel: 'Marketplace deal reviews',
                reviewsText: 'reviews',
                formTitle: 'Your review',
                formSub: 'Visible only to you · support @FunPayToGift',
                labelRating: 'RATING',
                labelNick: 'NICKNAME',
                labelGift: 'GIFT',
                labelText: 'TEXT',
                placeholderNick: 'Your nickname',
                placeholderGift: 'gift name',
                placeholderText: 'how was the gift transfer',
                toast: '✅ Review sent!',
                toastError: '⚠️ Please select a rating (1-5)',
                toastErrorNick: '⚠️ Enter your nickname',
                toastErrorGift: '⚠️ Enter the gift name',
                toastErrorText: '⚠️ Write your review text',
                btnSubmit: '📤 Send review',
                loadMore: 'Load more'
            }
        };

        let currentLang = 'ru';

        function setLanguage(lang) {
            currentLang = lang;
            const t = translations[lang];
            document.getElementById('brandName').textContent = t.brandName;
            document.getElementById('brandSub').textContent = t.brandSub;
            document.getElementById('ratingLabel').textContent = t.ratingLabel;
            document.getElementById('reviewsText').textContent = t.reviewsText;
            document.getElementById('formTitle').textContent = t.formTitle;
            document.getElementById('formSub').innerHTML = t.formSub;
            document.getElementById('labelRating').textContent = t.labelRating;
            document.getElementById('labelNick').textContent = t.labelNick;
            document.getElementById('labelGift').textContent = t.labelGift;
            document.getElementById('labelText').textContent = t.labelText;
            document.getElementById('nickInput').placeholder = t.placeholderNick;
            document.getElementById('giftInput').placeholder = t.placeholderGift;
            document.getElementById('textInput').placeholder = t.placeholderText;
            document.getElementById('submitBtn').textContent = t.btnSubmit;
            document.getElementById('langRu').classList.toggle('active', lang === 'ru');
            document.getElementById('langEn').classList.toggle('active', lang === 'en');
        }

        document.getElementById('langRu').addEventListener('click', () => setLanguage('ru'));
        document.getElementById('langEn').addEventListener('click', () => setLanguage('en'));

        // ===== ЗВЁЗДЫ =====
        const starsContainer = document.getElementById('starsContainer');
        const starElements = starsContainer.querySelectorAll('.star');
        let selectedRating = 0;

        starElements.forEach(star => {
            star.addEventListener('click', function() {
                const value = parseInt(this.dataset.value);
                selectedRating = value;
                starElements.forEach(s => {
                    s.classList.toggle('active', parseInt(s.dataset.value) <= value);
                });
            });
            star.addEventListener('mouseenter', function() {
                const value = parseInt(this.dataset.value);
                starElements.forEach(s => {
                    s.style.color = parseInt(s.dataset.value) <= value ? '#fbbf24' : '#333';
                });
            });
            star.addEventListener('mouseleave', function() {
                starElements.forEach(s => {
                    s.style.color = s.classList.contains('active') ? '#fbbf24' : '#333';
                });
            });
        });

        // ===== ОТПРАВКА =====
        const nickInput = document.getElementById('nickInput');
        const giftInput = document.getElementById('giftInput');
        const textInput = document.getElementById('textInput');
        const submitBtn = document.getElementById('submitBtn');
        const toast = document.getElementById('toast');

        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            const user = tg.initDataUnsafe.user;
            if (user.username) nickInput.value = '@' + user.username;
            else if (user.first_name) nickInput.value = user.first_name;
        }

        submitBtn.addEventListener('click', function() {
            const t = translations[currentLang];
            const rating = selectedRating;
            const nick = nickInput.value.trim();
            const gift = giftInput.value.trim();
            const text = textInput.value.trim();

            if (rating === 0) { showToast(t.toastError); return; }
            if (!nick) { showToast(t.toastErrorNick); return; }
            if (!gift) { showToast(t.toastErrorGift); return; }
            if (!text) { showToast(t.toastErrorText); return; }

            const reviewData = { rating, nick, gift, text };
            tg.sendData(JSON.stringify(reviewData));
            showToast(t.toast);

            selectedRating = 0;
            starElements.forEach(s => s.classList.remove('active'));
            giftInput.value = '';
            textInput.value = '';
        });

        let toastTimeout;
        function showToast(msg) {
            toast.textContent = msg;
            toast.classList.add('show');
            clearTimeout(toastTimeout);
            toastTimeout = setTimeout(() => {
                toast.classList.remove('show');
            }, 2500);
        }

        tg.onEvent('viewportChanged', function() {
            tg.expand();
        });

        // ===== ЗАПУСК =====
        totalDisplay.textContent = TOTAL_REVIEWS;
        renderPage(0);
        console.log('FunPay WebApp loaded! Unique reviews: ' + allReviews.length);
    </script>
</body>
</html>
